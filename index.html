<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<meta name="format-detection" content="email=no">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<meta name="theme-color" content="#1a56db">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="外初机考训练">
<meta name="apple-mobile-web-app-title" content="外初机考训练">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="renderer" content="webkit">
<meta name="full-screen" content="yes">
<meta name="x5-fullscreen" content="true">
<meta name="browsermode" content="application">
<meta name="x5-page-mode" content="app">
<title>武汉外初 · 人机对话模拟训练</title>
<style>
/* ========== 基础重置 ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a56db; --blue-light:#e8f0fe; --blue-dark:#0f3b99;
  --green:#0d9488; --green-light:#e6f7f5; --green-dark:#0b6e66;
  --orange:#ea580c; --orange-light:#fff3eb; --orange-dark:#b8450b;
  --bg:#f5f7fa; --card:#fff; --text:#1e293b; --text-secondary:#64748b;
  --border:#e2e8f0; --danger:#dc2626; --success:#16a34a; --warning:#f59e0b;
  --radius:16px; --radius-sm:10px;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
}
html,body{
  height:100%; width:100%;
  overflow:hidden;
  -webkit-overflow-scrolling:touch;
  /* 禁止iOS橡皮筋效果 */
  position:fixed; top:0; left:0; right:0; bottom:0;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Helvetica Neue",Arial,sans-serif;
  background:var(--bg); color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none; user-select:none;
  -webkit-touch-callout:none;
  /* 禁止双击缩放 */
  touch-action:manipulation;
}
#app{
  width:100%; height:100%;
  max-width:1200px;
  margin:0 auto;
  display:flex; flex-direction:column; overflow:hidden;
  background:var(--bg);
}

/* ========== 顶部导航栏 ========== */
.topbar{
  display:flex; align-items:center; padding:8px 12px; gap:8px;
  background:var(--card); border-bottom:1px solid var(--border);
  flex-shrink:0; min-height:44px;
}
.topbar .back-btn{
  display:none; flex-shrink:0;
  background:none; border:none; outline:none;
  font-size:16px; color:var(--blue); font-weight:600;
  padding:8px 6px; border-radius:6px;
  min-width:44px; min-height:36px;
  cursor:pointer; line-height:1;
}
.topbar .back-btn.visible{display:inline-block}
.topbar .back-btn:active{background:#d0d8e8}
.topbar .logo{
  font-size:16px; font-weight:700; color:var(--blue);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  flex:1; min-width:0;
}
.topbar .progress-info{
  font-size:12px; color:var(--text-secondary);
  white-space:nowrap; flex-shrink:0;
}

/* ========== 主内容区 ========== */
.main{
  flex:1; overflow-y:auto;
  padding:12px 10px;
  -webkit-overflow-scrolling:touch;
  /* 在iOS上防止意外滚动 */
  -webkit-overflow-scrolling:touch;
}

/* ========== 首页 ========== */
.home-screen{
  display:flex; flex-direction:column; gap:16px;
  max-width:800px; margin:0 auto; padding-top:4px;
}
.home-screen h1{
  font-size:22px; text-align:center; color:var(--text); line-height:1.4;
}
.home-screen h1 small{
  display:block; font-size:14px; color:var(--text-secondary);
  font-weight:400; margin-top:4px;
}
.cards{display:flex; flex-wrap:wrap; gap:12px}
.cards > *{flex:1 1 0; min-width:150px}
.card{
  background:var(--card); border-radius:var(--radius); padding:20px 16px;
  box-shadow:var(--shadow); cursor:pointer;
  border:2px solid transparent; text-align:center;
  display:flex; flex-direction:column; align-items:center; gap:8px;
  justify-content:center; min-height:120px;
  -webkit-tap-highlight-color:transparent;
}
.card:active{transform:scale(.97); -webkit-transform:scale(.97)}
.card .icon{font-size:40px; line-height:1}
.card h2{font-size:17px; font-weight:700}
.card p{font-size:12px; color:var(--text-secondary); line-height:1.5}
.card.mock{border-color:var(--blue)}
.card.mock h2{color:var(--blue)}
.card.mock .icon{color:var(--blue)}
.card.past{border-color:var(--green)}
.card.past h2{color:var(--green)}
.card.past .icon{color:var(--green)}

.rules-box{
  background:var(--card); border-radius:var(--radius); padding:14px 16px;
  box-shadow:var(--shadow-sm); border-left:4px solid var(--warning);
}
.rules-box h3{font-size:15px; color:var(--warning); margin-bottom:8px}
.rules-box ul{list-style:none; font-size:13px; color:var(--text-secondary); line-height:1.9}
.rules-box ul li{padding-left:0}
.rules-box ul li::before{content:"⚠️ "; color:var(--warning)}

/* ========== 考试界面 ========== */
.exam-screen{
  display:flex; flex-direction:column; gap:12px;
  max-width:900px; margin:0 auto; min-height:100%;
}
.exam-header{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  background:var(--card); border-radius:var(--radius); padding:10px 12px;
  box-shadow:var(--shadow-sm);
}
.exam-header .subject-badge{
  padding:4px 10px; border-radius:16px; font-weight:700;
  font-size:12px; color:#fff; white-space:nowrap;
}
.exam-header .subject-badge.english{background:var(--blue)}
.exam-header .subject-badge.chinese{background:var(--green)}
.exam-header .subject-badge.math{background:var(--orange)}
.exam-header .q-counter{
  font-weight:600; font-size:15px; white-space:nowrap;
}
.exam-header .timer-wrap{
  flex:1; display:flex; align-items:center; gap:6px; min-width:100px;
}
.timer-bar{
  flex:1; height:8px; background:#e5e7eb; border-radius:4px; overflow:hidden;
}
.timer-bar-fill{
  height:100%; border-radius:4px; transition:width 1s linear,background-color .3s;
}
.timer-bar-fill.normal{background:var(--success)}
.timer-bar-fill.warning{background:var(--warning)}
.timer-bar-fill.danger{background:var(--danger)}
.timer-text{
  font-weight:700; font-size:18px; min-width:38px; text-align:center;
}
.timer-text.warning{color:var(--warning)}
.timer-text.danger{color:var(--danger)}

.exam-question{
  background:var(--card); border-radius:var(--radius); padding:16px 14px;
  box-shadow:var(--shadow-sm); flex:1;
}
.exam-question .q-num{
  font-size:12px; color:var(--text-secondary); margin-bottom:6px;
}
.exam-question .q-text{
  font-size:16px; line-height:1.7; margin-bottom:16px; font-weight:500;
  word-break:break-word;
}
.exam-question .multi-tag{
  display:inline-block; background:var(--orange); color:#fff;
  padding:2px 6px; border-radius:3px; font-size:11px; margin-right:5px; vertical-align:middle;
}
.exam-options{display:flex; flex-direction:column; gap:8px}
.exam-option{
  display:flex; align-items:flex-start; gap:10px; padding:12px 14px;
  background:var(--bg); border-radius:var(--radius-sm); cursor:pointer;
  border:2px solid transparent;
  font-size:15px; line-height:1.5;
  min-height:44px;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none; user-select:none;
}
.exam-option:active{transform:scale(.985); -webkit-transform:scale(.985)}
.exam-option.selected{
  background:var(--blue-light); border-color:var(--blue); font-weight:600;
}
.exam-option .opt-letter{
  width:28px; height:28px; min-width:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; font-size:13px; background:#e5e7eb; flex-shrink:0;
}
.exam-option.selected .opt-letter{background:var(--blue); color:#fff}
.exam-option.multi-selected{
  background:var(--orange-light); border-color:var(--orange);
}
.exam-option.multi-selected .opt-letter{background:var(--orange); color:#fff}
.exam-option.correct-highlight{background:#dcfce7; border-color:var(--success)}
.exam-option.correct-highlight .opt-letter{background:var(--success); color:#fff}
.exam-option.wrong-highlight{background:#fef2f2; border-color:var(--danger)}
.exam-option.wrong-highlight .opt-letter{background:var(--danger); color:#fff}

.exam-submit{
  display:flex; justify-content:center; padding:6px 0 12px;
}
.exam-submit button{
  padding:12px 40px; font-size:17px; font-weight:700;
  border:none; border-radius:24px; cursor:pointer; color:#fff;
  background:var(--blue);
  min-height:44px; min-width:140px;
  outline:none;
}
.exam-submit button:active{transform:scale(.96); -webkit-transform:scale(.96); background:var(--blue-dark)}

/* ========== 结果页面 ========== */
.results-screen{
  max-width:700px; margin:0 auto; display:flex; flex-direction:column; gap:16px;
}
.results-header{text-align:center; padding:12px 0}
.results-header h1{font-size:24px; margin-bottom:8px}
.results-header .score-big{font-size:56px; font-weight:900; color:var(--blue); line-height:1.1}
.results-header .score-label{font-size:14px; color:var(--text-secondary); margin-top:4px}
.score-grid{display:flex; flex-wrap:wrap; gap:10px}
.score-grid > *{flex:1 1 0; min-width:100px}
.score-card{
  background:var(--card); border-radius:var(--radius); padding:14px 8px;
  box-shadow:var(--shadow-sm); text-align:center;
}
.score-card .subj{font-size:12px; font-weight:700; margin-bottom:4px}
.score-card .pts{font-size:20px; font-weight:900}
.score-card .rate{font-size:11px; color:var(--text-secondary)}
.score-card.english .subj,.score-card.english .pts{color:var(--blue)}
.score-card.chinese .subj,.score-card.chinese .pts{color:var(--green)}
.score-card.math .subj,.score-card.math .pts{color:var(--orange)}

.results-actions{display:flex; gap:8px; justify-content:center; flex-wrap:wrap}
.results-actions button{
  padding:10px 18px; font-size:14px; font-weight:700;
  border:2px solid var(--blue); border-radius:24px; cursor:pointer;
  background:#fff; color:var(--blue); min-height:42px; outline:none;
}
.results-actions button:active{background:var(--blue); color:#fff}
.results-actions button.primary{background:var(--blue); color:#fff; border-color:var(--blue)}
.results-actions button.primary:active{background:var(--blue-dark)}
.results-actions button.danger-btn{background:var(--danger); color:#fff; border-color:var(--danger)}
.results-actions button.danger-btn:active{background:#b91c1c}

/* ========== 答案查看 ========== */
.answer-review{margin-top:8px}
.answer-review h3{font-size:17px; margin-bottom:12px; text-align:center}
.review-item{
  background:var(--card); border-radius:var(--radius-sm); padding:12px;
  margin-bottom:8px; box-shadow:var(--shadow-sm);
  font-size:14px; line-height:1.5;
}
.review-item .ri-q{font-weight:600; margin-bottom:4px}
.review-item .ri-a{color:var(--success); font-weight:600}
.review-item .ri-e{color:var(--text-secondary); font-size:12px; margin-top:2px}
.review-item.wrong{border-left:4px solid var(--danger)}
.review-item.wrong .ri-a{color:var(--danger)}
.review-item .ri-user{color:var(--danger); font-size:12px}

/* ========== 真题浏览 ========== */
.practice-screen{
  max-width:800px; margin:0 auto; display:flex; flex-direction:column; gap:14px;
}
.practice-screen h2{font-size:19px}
.year-list{display:flex; flex-direction:column; gap:8px}
.year-item{
  background:var(--card); border-radius:var(--radius); padding:14px 16px;
  box-shadow:var(--shadow-sm); cursor:pointer; border-left:5px solid var(--green);
  display:flex; justify-content:space-between; align-items:center;
  gap:10px; min-height:50px;
  -webkit-tap-highlight-color:transparent;
}
.year-item:active{transform:scale(.98); -webkit-transform:scale(.98); background:var(--green-light)}
.year-item .yr{font-size:19px; font-weight:700; color:var(--green); white-space:nowrap}
.year-item .yr-desc{
  font-size:12px; color:var(--text-secondary); flex:1;
  text-align:right; line-height:1.4;
}

.practice-detail{display:flex; flex-direction:column; gap:12px}
.practice-detail .pd-header{text-align:center}
.practice-detail .pd-header h2{font-size:19px; color:var(--green)}
.practice-detail .pd-header p{font-size:13px; color:var(--text-secondary); margin-top:4px}
.practice-q{
  background:var(--card); border-radius:var(--radius); padding:14px 16px;
  box-shadow:var(--shadow-sm);
}
.practice-q .pq-num{font-size:12px; color:var(--text-secondary); margin-bottom:4px}
.practice-q .pq-text{font-size:14px; line-height:1.7; margin-bottom:8px}
.practice-q .pq-options{font-size:13px; line-height:1.8; color:var(--text-secondary); margin-bottom:8px}
.practice-q .pq-answer{display:none; background:var(--green-light); padding:8px 12px; border-radius:8px; font-size:13px; color:var(--green-dark)}
.practice-q .pq-answer.show{display:block}
.show-answer-btn{
  background:none; border:1px solid var(--green); color:var(--green);
  padding:7px 14px; border-radius:18px; cursor:pointer;
  font-size:12px; margin-top:4px; min-height:36px; outline:none;
}
.show-answer-btn:active{background:var(--green); color:#fff}

/* ========== 空状态 ========== */
.empty-state{text-align:center; padding:40px 12px; color:var(--text-secondary)}
.empty-state .icon{font-size:48px; margin-bottom:12px}

/* ========== 滚动条 ========== */
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-track{background:transparent}
.main::-webkit-scrollbar-thumb{background:#cbd5e1; border-radius:2px}

/* ========== 动画 ========== */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px); -webkit-transform:translateY(10px)}
  to{opacity:1; transform:translateY(0); -webkit-transform:translateY(0)}
}
.fade-in{animation:fadeIn .25s ease-out; -webkit-animation:fadeIn .25s ease-out}
@keyframes pulse{
  0%,100%{transform:scale(1); -webkit-transform:scale(1)}
  50%{transform:scale(1.05); -webkit-transform:scale(1.05)}
}
.pulse{animation:pulse .6s ease-in-out; -webkit-animation:pulse .6s ease-in-out}
@keyframes flashRed{
  0%,100%{background:var(--card)}
  50%{background:#fee2e2}
}
.flash-red{animation:flashRed .4s ease-in-out 2; -webkit-animation:flashRed .4s ease-in-out 2}

/* ========== 响应式：平板及以上 ========== */
@media(min-width:600px){
  .topbar{padding:10px 16px}
  .main{padding:20px 16px}
  .home-screen{gap:20px; padding-top:12px}
  .home-screen h1{font-size:26px}
  .home-screen h1 small{font-size:16px}
  .card{padding:28px 20px; min-height:140px}
  .card .icon{font-size:48px}
  .card h2{font-size:20px}
  .card p{font-size:14px}
  .card:hover{border-color:var(--blue); transform:translateY(-2px); -webkit-transform:translateY(-2px); box-shadow:0 8px 32px rgba(0,0,0,.12)}
  .card.past:hover{border-color:var(--green)}
  .exam-header{padding:14px 18px; gap:12px}
  .exam-header .subject-badge{font-size:14px; padding:5px 14px}
  .exam-header .q-counter{font-size:17px}
  .exam-question{padding:24px 20px}
  .exam-question .q-text{font-size:18px}
  .exam-option{font-size:16px; padding:15px 18px}
  .exam-option:hover{background:#e8f0fe; border-color:var(--blue-light)}
  .exam-submit button{font-size:18px; padding:14px 52px}
  .year-item:hover{background:var(--green-light); transform:translateX(4px); -webkit-transform:translateX(4px)}
  .results-actions button:hover{background:var(--blue); color:#fff}
  .results-actions button.primary:hover{background:var(--blue-dark)}
  .results-actions button.danger-btn:hover{background:#b91c1c}
  .show-answer-btn:hover{background:var(--green); color:#fff}
  .results-header h1{font-size:30px}
  .results-header .score-big{font-size:68px}
  .practice-screen h2{font-size:22px}
}

@media(min-width:1024px){
  .main{padding:28px 32px}
  .topbar .logo{font-size:18px}
  .home-screen h1{font-size:30px}
}
</style>
</head>
<body>
<div id="app">
  <div class="install-banner" id="installBanner" onclick="installApp()" style="display:none;background:var(--blue);color:#fff;padding:12px 16px;text-align:center;font-size:14px;cursor:pointer;flex-shrink:0">
    📲 点击此处安装到桌面，像APP一样使用
  </div>
  <div class="topbar" id="topbar">
    <button class="back-btn" id="backBtn">← 返回</button>
    <span class="logo">📋 武汉外初 · 人机对话模拟训练</span>
    <span class="progress-info" id="progressInfo"></span>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
// ==================== PWA 安装 ====================
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').style.display = 'block';
});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(result){
      if(result.outcome === 'accepted') document.getElementById('installBanner').style.display = 'none';
      deferredPrompt = null;
    });
  } else {
    var isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
    alert(isIOS ? 'iOS安装：\n1. 点击浏览器底部"分享"\n2. 滑动找到"添加到主屏幕"\n3. 点击"添加"' : '安装：\n1. 点击浏览器菜单\n2. 选择"添加到主屏幕"');
  }
}
// 延迟检测：3秒后若未触发beforeinstallprompt，手动显示
setTimeout(function(){
  if(!deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches && /iphone|ipad|ipod|android/.test(navigator.userAgent.toLowerCase())){
    document.getElementById('installBanner').style.display = 'block';
  }
}, 3000);
// 注册 Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}

// ==================== 微信/移动端兼容启动 ====================
(function(){
  // 修复iOS微信中 body position:fixed 导致的高度问题
  function fixViewport(){
    var h = window.innerHeight;
    document.body.style.height = h + 'px';
    document.getElementById('app').style.height = h + 'px';
  }
  fixViewport();
  // 微信中orientationchange/ resize时重新计算
  var resizeTimer = null;
  window.addEventListener('orientationchange', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(fixViewport, 300);
  });
  window.addEventListener('resize', function(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(fixViewport, 200);
  });
})();

// ==================== 快捷DOM访问 ====================
function $(s){return document.querySelector(s);}

var main = document.getElementById('mainContent');
var backBtn = document.getElementById('backBtn');
var progressInfo = document.getElementById('progressInfo');

// ==================== 应用状态 ====================
var appState = {
  screen: 'home',
  exam: {
    sections: null,
    sectionIndex: 0,
    currentIndex: 0,
    userAnswers: {},
    completed: false,
    timedOut: false,
    timerInterval: null,
    selectedOptions: null
  },
  practice: {},
  _reviewData: null
};

var navStack = [];

// ==================== 导航系统 ====================
function navigate(screen, data){
  navStack.push({screen: appState.screen, data: {}});
  appState.screen = screen;
  if(appState.exam.timerInterval){
    clearInterval(appState.exam.timerInterval);
    appState.exam.timerInterval = null;
  }
  renderScreen(screen, data || {});
  updateBackBtn();
}

function goBack(){
  if(appState.exam.timerInterval){
    clearInterval(appState.exam.timerInterval);
    appState.exam.timerInterval = null;
  }
  if(navStack.length === 0){
    appState.screen = 'home';
    renderScreen('home', {});
    updateBackBtn();
    return;
  }
  var prev = navStack.pop();
  appState.screen = prev.screen;
  renderScreen(prev.screen, prev.data || {});
  updateBackBtn();
}

function updateBackBtn(){
  if(appState.screen === 'home'){
    backBtn.classList.remove('visible');
    backBtn.style.display = 'none';
  } else {
    backBtn.classList.add('visible');
    backBtn.style.display = 'inline-block';
  }
}

// ==================== 界页渲染 ====================
function renderScreen(screen, data){
  main.className = 'main fade-in';
  progressInfo.textContent = '';
  switch(screen){
    case 'home': renderHome(); break;
    case 'exam': renderExam(); break;
    case 'results': renderResults(); break;
    case 'review': renderReview(); break;
    case 'practiceList': renderPracticeList(); break;
    case 'practiceDetail': renderPracticeDetail(data.yearIndex); break;
    case 'wrongBook': renderWrongBook(); break;
    case 'wrongBookPractice': renderWrongBookPractice(); break;
  }
  main.scrollTop = 0;
}

// ==================== 首页 ====================

// ==================== 考试引擎 ====================
function startExam(mockSet){
  mockSet = mockSet || 1;
  var ENG, CHI, MAT;
  if(mockSet === 2){ ENG = MOCK2_ENGLISH; CHI = MOCK2_CHINESE; MAT = MOCK2_MATH; }
  else if(mockSet === 3){ ENG = MOCK3_ENGLISH; CHI = MOCK3_CHINESE; MAT = MOCK3_MATH; }
  else if(mockSet === 4){ ENG = MOCK4_ENGLISH; CHI = MOCK4_CHINESE; MAT = MOCK4_MATH; }
  else if(mockSet === 5){ ENG = MOCK5_ENGLISH; CHI = MOCK5_CHINESE; MAT = MOCK5_MATH; }
  else if(mockSet === 6){ ENG = MOCK6_ENGLISH; CHI = MOCK6_CHINESE; MAT = MOCK6_MATH; }
  else if(mockSet === 7){ ENG = MOCK7_ENGLISH; CHI = MOCK7_CHINESE; MAT = MOCK7_MATH; }
  else if(mockSet === 8){ ENG = MOCK8_ENGLISH; CHI = MOCK8_CHINESE; MAT = MOCK8_MATH; }
  else if(mockSet === 9){ ENG = MOCK9_ENGLISH; CHI = MOCK9_CHINESE; MAT = MOCK9_MATH; }
  else if(mockSet === 10){ ENG = MOCK10_ENGLISH; CHI = MOCK10_CHINESE; MAT = MOCK10_MATH; }
  else if(mockSet === 11){ ENG = MOCK11_ENGLISH; CHI = MOCK11_CHINESE; MAT = MOCK11_MATH; }
  else if(mockSet === 12){ ENG = MOCK12_ENGLISH; CHI = MOCK12_CHINESE; MAT = MOCK12_MATH; }
  else if(mockSet === 13){ ENG = MOCK13_ENGLISH; CHI = MOCK13_CHINESE; MAT = MOCK13_MATH; }
  else if(mockSet === 14){ ENG = MOCK14_ENGLISH; CHI = MOCK14_CHINESE; MAT = MOCK14_MATH; }
  else if(mockSet === 15){ ENG = MOCK15_ENGLISH; CHI = MOCK15_CHINESE; MAT = MOCK15_MATH; }
  else if(mockSet === 16){ ENG = MOCK16_ENGLISH; CHI = MOCK16_CHINESE; MAT = MOCK16_MATH; }
  else { ENG = MOCK_ENGLISH; CHI = MOCK_CHINESE; MAT = MOCK_MATH; }
  var sections = [
    {name: '英语', cls: 'english', timePerQ: 35, questions: ENG},
    {name: '语文', cls: 'chinese', timePerQ: 40, questions: CHI},
    {name: '数学', cls: 'math', timePerQ: 50, questions: MAT}
  ];

  appState.exam = {
    sections: sections,
    sectionIndex: 0,
    currentIndex: 0,
    userAnswers: {},
    completed: false,
    timedOut: false,
    timerInterval: null,
    selectedOptions: null,
    _mockSet: mockSet,
    isWrongBookExam: false
  };

  navStack = [];
  appState.screen = 'exam';
  updateBackBtn();
  renderExam();
}

function getCurrentQ(){
  var ex = appState.exam;
  var sec = ex.sections[ex.sectionIndex];
  if(!sec) return null;
  return {
    q: sec.questions[ex.currentIndex],
    subject: sec.name,
    subjectCls: sec.cls,
    timePerQ: sec.timePerQ,
    idxInSection: ex.currentIndex,
    totalInSection: sec.questions.length,
    flatIndex: getFlatIdx(),
    totalQ: ex.sections.reduce(function(s,sec){return s+sec.questions.length;}, 0)
  };
}

function getFlatIdx(){
  var ex = appState.exam;
  var idx = 0;
  for(var i = 0; i < ex.sectionIndex; i++){
    idx += ex.sections[i].questions.length;
  }
  return idx + ex.currentIndex;
}

function renderExam(){
  var cur = getCurrentQ();
  if(!cur){
    finishExam();
    return;
  }

  var ex = appState.exam;
  var sec = ex.sections[ex.sectionIndex];
  var q = cur.q;
  var totalQ = cur.totalQ;
  var flatNum = cur.flatIndex + 1;

  ex.selectedOptions = (q.type === 'multi') ? [] : null;
  ex.timeLeft = cur.timePerQ;

  progressInfo.textContent = sec.name + ' · 第' + (ex.currentIndex + 1) + '/' + sec.questions.length + '题';

  var labels = ['A','B','C','D','E','F'];
  var optionsHTML = '';
  if(q.options && q.options.length > 0){
    for(var i = 0; i < q.options.length; i++){
      optionsHTML += '<div class="exam-option" id="opt' + i + '" onclick="selOpt(' + i + ')">' +
        '<span class="opt-letter">' + labels[i] + '</span>' +
        '<span>' + q.options[i].replace(/^[A-F][.、]?\s*/, '') + '</span>' +
      '</div>';
    }
  }

  var multiHint = '';
  if(q.type === 'multi'){
    multiHint = '<div style="font-size:12px;color:var(--orange);margin-bottom:8px">※ 多选题：点击多个选项，全对得分，错选漏选不得分</div>';
  }

  var multiTag = '';
  if(q.type === 'multi'){
    multiTag = '<span class="multi-tag">多选</span> ';
  }

  main.innerHTML = '<div class="exam-screen">' +
    '<div class="exam-header">' +
      '<span class="subject-badge ' + cur.subjectCls + '">' + cur.subject + '</span>' +
      '<span class="q-counter">第 ' + flatNum + ' / ' + totalQ + ' 题</span>' +
      '<div class="timer-wrap">' +
        '<div class="timer-bar"><div class="timer-bar-fill normal" id="timerBar" style="width:100%"></div></div>' +
        '<span class="timer-text" id="timerText">' + cur.timePerQ + '″</span>' +
      '</div>' +
    '</div>' +
    '<div class="exam-question" id="questionBox">' +
      '<div class="q-num">第 ' + (ex.currentIndex + 1) + ' 题 · ' + cur.subject + '</div>' +
      '<div class="q-text">' + multiTag + q.question + '</div>' +
      multiHint +
      '<div class="exam-options" id="optionsList">' + optionsHTML + '</div>' +
    '</div>' +
    '<div class="exam-submit">' +
      '<button onclick="submitAns()" id="submitBtn">✓ 确认答案</button>' +
    '</div>' +
  '</div>';

  startTimer(cur.timePerQ);
}

function selOpt(index){
  var ex = appState.exam;
  var cur = getCurrentQ();
  if(!cur) return;

  if(cur.q.type === 'multi'){
    var sel = ex.selectedOptions;
    var pos = -1;
    for(var i = 0; i < sel.length; i++){
      if(sel[i] === index){ pos = i; break; }
    }
    var el = document.getElementById('opt' + index);
    if(pos >= 0){
      sel.splice(pos, 1);
      if(el) el.classList.remove('multi-selected');
    } else {
      sel.push(index);
      if(el) el.classList.add('multi-selected');
    }
  } else {
    var all = document.querySelectorAll('.exam-option');
    for(var i = 0; i < all.length; i++){
      all[i].classList.remove('selected');
    }
    var el = document.getElementById('opt' + index);
    if(el) el.classList.add('selected');
    ex.selectedOptions = [index];
  }
}

function submitAns(){
  var ex = appState.exam;
  if(ex.timerInterval){
    clearInterval(ex.timerInterval);
    ex.timerInterval = null;
  }

  var cur = getCurrentQ();
  if(!cur) return;

  var flatIdx = cur.flatIndex;

  if(cur.q.type === 'multi'){
    ex.userAnswers[flatIdx] = ex.selectedOptions.slice().sort();
  } else {
    ex.userAnswers[flatIdx] = (ex.selectedOptions && ex.selectedOptions.length > 0) ? ex.selectedOptions[0] : -1;
  }

  advanceQ();
}

function advanceQ(){
  var ex = appState.exam;
  var sec = ex.sections[ex.sectionIndex];

  ex.currentIndex++;

  if(ex.currentIndex >= sec.questions.length){
    ex.sectionIndex++;
    ex.currentIndex = 0;

    if(ex.sectionIndex >= ex.sections.length){
      finishExam();
      return;
    }
  }

  renderExam();
}

function startTimer(seconds){
  var ex = appState.exam;
  ex.timeLeft = seconds;
  var totalTime = seconds;

  if(ex.timerInterval){
    clearInterval(ex.timerInterval);
  }

  ex.timerInterval = setInterval(function(){
    ex.timeLeft--;
    var pct = ex.timeLeft > 0 ? (ex.timeLeft / totalTime) * 100 : 0;
    if(pct < 0) pct = 0;

    var timerBar = document.getElementById('timerBar');
    var timerText = document.getElementById('timerText');
    var questionBox = document.getElementById('questionBox');

    if(timerBar){
      timerBar.style.width = pct + '%';
      var cls = pct > 50 ? 'normal' : (pct > 25 ? 'warning' : 'danger');
      timerBar.className = 'timer-bar-fill ' + cls;
    }
    if(timerText){
      timerText.textContent = ex.timeLeft + '″';
      var cls2 = ex.timeLeft > totalTime * 0.5 ? '' : (ex.timeLeft > totalTime * 0.25 ? 'warning' : 'danger');
      timerText.className = 'timer-text ' + cls2;
    }

    if(ex.timeLeft <= 5 && ex.timeLeft > 0 && timerText){
      timerText.classList.add('pulse');
      setTimeout(function(){
        if(timerText) timerText.classList.remove('pulse');
      }, 600);
    }

    if(ex.timeLeft <= 0){
      clearInterval(ex.timerInterval);
      ex.timerInterval = null;
      var flatIdx = getFlatIdx();
      if(!(flatIdx in ex.userAnswers)){
        ex.userAnswers[flatIdx] = -1;
      }
      if(questionBox){
        questionBox.classList.add('flash-red');
        setTimeout(function(){
          if(questionBox) questionBox.classList.remove('flash-red');
        }, 800);
      }
      ex.timedOut = true;
      setTimeout(function(){ advanceQ(); }, 600);
    }
  }, 1000);
}

function finishExam(){
  var ex = appState.exam;
  if(ex.timerInterval){
    clearInterval(ex.timerInterval);
    ex.timerInterval = null;
  }
  ex.completed = true;
  navigate('results');
}

// ==================== 结果 ====================
function renderResults(){
  var ex = appState.exam;
  var allQ = [];
  for(var s = 0; s < ex.sections.length; s++){
    var sec = ex.sections[s];
    for(var i = 0; i < sec.questions.length; i++){
      allQ.push({
        q: sec.questions[i],
        subject: sec.name,
        subjectCls: sec.cls
      });
    }
  }

  var total = allQ.length;
  var correctCount = 0;
  var subjR = {};
  var reviewData = [];

  for(var i = 0; i < allQ.length; i++){
    var ua = (ex.userAnswers[i] !== undefined) ? ex.userAnswers[i] : -1;
    var isCorrect = checkAns(allQ[i].q, ua);
    var subj = allQ[i].subject;
    if(!subjR[subj]){ subjR[subj] = {total:0, correct:0}; }
    subjR[subj].total++;
    if(isCorrect){
      correctCount++;
      subjR[subj].correct++;
    }
    reviewData.push({
      q: allQ[i].q,
      subject: allQ[i].subject,
      index: i,
      userAnswer: ua,
      isCorrect: isCorrect
    });
  }

  var score = Math.round((correctCount / total) * 150);
  var rate = Math.round(correctCount / total * 100);

  // Build score cards for all subjects that have questions
  var subjectOrder = ['英语','语文','数学'];
  var subjKeys = Object.keys(subjR);
  // Sort: put known subjects in order, then add any others
  var cardsHTML = '';
  for(var s = 0; s < subjectOrder.length; s++){
    var sb = subjectOrder[s];
    if(subjR[sb] && subjR[sb].total > 0){
      var sr = subjR[sb];
      var cls = (sb === '英语') ? 'english' : (sb === '语文') ? 'chinese' : 'math';
      cardsHTML += '<div class="score-card ' + cls + '">' +
        '<div class="subj">' + sb + '</div>' +
        '<div class="pts">' + sr.correct + '/' + sr.total + '</div>' +
        '<div class="rate">' + Math.round(sr.correct / Math.max(1,sr.total) * 100) + '%</div>' +
      '</div>';
    }
  }
  // Add any non-standard subjects (like 错题重练)
  for(var k = 0; k < subjKeys.length; k++){
    var key = subjKeys[k];
    if(subjectOrder.indexOf(key) >= 0) continue; // Already added
    var sr = subjR[key];
    cardsHTML += '<div class="score-card english">' +
      '<div class="subj">' + key + '</div>' +
      '<div class="pts">' + sr.correct + '/' + sr.total + '</div>' +
      '<div class="rate">' + Math.round(sr.correct / Math.max(1,sr.total) * 100) + '%</div>' +
    '</div>';
  }

  main.innerHTML = '<div class="results-screen">' +
    '<div class="results-header">' +
      '<h1>📊 考试完成！</h1>' +
      '<div class="score-big">' + score + '</div>' +
      '<div class="score-label">满分150分 · 正确 ' + correctCount + '/' + total + ' · 正确率 ' + rate + '%</div>' +
    '</div>' +
    '<div class="score-grid">' + cardsHTML + '</div>' +
    '<div class="results-actions">' +
      '<button onclick="startExam()">🔄 重新考试</button>' +
      '<button class="primary" onclick="showReview()">📋 查看答案与解析</button>' +
      (ex.isWrongBookExam ? '<button class="danger-btn" onclick="navigate(\'wrongBook\')">📕 返回错题本</button>' : '') +
      '<button onclick="navigate(\'home\')">🏠 返回首页</button>' +
    '</div>' +
  '</div>';

  appState._reviewData = reviewData;

  // Sync wrong book
  var mockSetNames = {
    1: '模拟卷一', 2: '模拟卷二', 3: '模拟卷三', 4: '模拟卷四', 5: '模拟卷五', 6: '模拟卷六',
    7: '真题训练七(2023)', 8: '真题训练八(2021)', 9: '真题训练九(2020)', 10: '真题训练十(2019)',
    11: '真题训练十一(2018)', 12: '真题训练十二(2024)', 13: '真题训练十三(2025)',
    14: '预测卷一', 15: '预测卷二', 16: '预测卷三'
  };

  // Detect which mock set was used
  var mockSetName = '';
  if(ex._mockSet) mockSetName = mockSetNames[ex._mockSet] || '';

  syncWrongBook(reviewData, mockSetName);
}

function checkAns(q, ua){
  if(q.type === 'multi'){
    var correct = q.answer.slice().sort();
    var user = (ua && ua.length) ? ua.slice().sort() : [];
    if(correct.length !== user.length) return false;
    for(var i = 0; i < correct.length; i++){
      if(correct[i] !== user[i]) return false;
    }
    return true;
  } else {
    return ua === q.answer;
  }
}

  navigate('review');
}

function renderReview(){
  var reviewData = appState._reviewData || [];
  var labels = ['A','B','C','D','E','F'];

  var html = '<div class="results-screen"><div style="text-align:center"><h2>📋 答案与解析</h2><p style="color:var(--text-secondary);margin-bottom:14px">全卷共' + reviewData.length + '题</p></div><div class="answer-review">';

  for(var i = 0; i < reviewData.length; i++){
    var r = reviewData[i];
    var q = r.q;
    var correctAns;
    if(q.type === 'multi'){
      var ca = [];
      for(var j = 0; j < q.answer.length; j++){ ca.push(labels[q.answer[j]]); }
      correctAns = ca.join('、');
    } else {
      correctAns = q.answer >= 0 ? labels[q.answer] : '—';
    }

    var userAnsStr;
    if(q.type === 'multi'){
      if(Array.isArray(r.userAnswer) && r.userAnswer.length > 0 && r.userAnswer[0] >= 0){
        var ua = [];
        for(var j = 0; j < r.userAnswer.length; j++){ ua.push(labels[r.userAnswer[j]]); }
        userAnsStr = ua.join('、');
      } else {
        userAnsStr = '未作答';
      }
    } else {
      userAnsStr = r.userAnswer >= 0 ? labels[r.userAnswer] : '未作答';
    }

var WRONG_BOOK_KEY = 'wfls_exam_wrong_book';

function getWrongBook(){
  try {
    var raw = localStorage.getItem(WRONG_BOOK_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) {
    return [];
  }
}

function saveWrongBook(book){
  try {
    localStorage.setItem(WRONG_BOOK_KEY, JSON.stringify(book));
  } catch(e) {}
}

// Generate a unique fingerprint for a question to identify it across exams
function qFingerprint(q){
  // Use question text (first 100 chars) + answer as fingerprint
  var text = (q.question || '').substring(0, 100).replace(/\s+/g, ' ').trim();
  var ans = Array.isArray(q.answer) ? q.answer.join(',') : String(q.answer);
  return text + '|' + ans;
}

function addToWrongBook(q, subject, mockSetName){
  var book = getWrongBook();
  var fp = qFingerprint(q);
  // Check if already exists
  for(var i = 0; i < book.length; i++){
    if(book[i].fingerprint === fp) return; // Already in book
  }
  book.push({
    fingerprint: fp,
    question: q.question,
    options: q.options || [],
    answer: q.answer,
    explanation: q.explanation || '',
    type: q.type || 'single',
    subject: subject || '',
    mockSet: mockSetName || '',
    addedAt: new Date().toISOString()
  });
  saveWrongBook(book);
  updateWrongBookHint();
}

function removeFromWrongBook(fingerprint){
  var book = getWrongBook();
  book = book.filter(function(item){ return item.fingerprint !== fingerprint; });
  saveWrongBook(book);
  updateWrongBookHint();
}

function isInWrongBook(q){
  var book = getWrongBook();
  var fp = qFingerprint(q);
  for(var i = 0; i < book.length; i++){
    if(book[i].fingerprint === fp) return true;
  }
  return false;
}

// After exam, sync wrong answers
function syncWrongBook(reviewData, mockSetName){
  for(var i = 0; i < reviewData.length; i++){
    var r = reviewData[i];
    if(r.isCorrect){
      // If answered correctly, remove from wrong book
      var fp = qFingerprint(r.q);
      if(isInWrongBook(r.q)){
        removeFromWrongBook(fp);
      }
    } else {
      // If wrong, add to wrong book
      addToWrongBook(r.q, r.subject, mockSetName);
    }
  }
}

function renderWrongBookPractice(){
  var p = appState.practice;
  var book = getWrongBook();

  // If all questions done
  if(p.currentIndex >= p.questions.length){
    var remaining = getWrongBook().length;
    if(remaining === 0){
      main.innerHTML = '<div class="results-screen"><div style="text-align:center;padding:40px 20px">' +
        '<div style="font-size:64px;margin-bottom:16px">🎉</div>' +

        '<p style="color:var(--text-secondary);margin-top:8px">所有错题都已做对，错题本已清空！</p>' +
        '<div class="results-actions" style="margin-top:20px">' +
          '<button onclick="navigate(\'wrongBook\')">📕 返回错题本</button>' +
          '<button onclick="navigate(\'home\')">🏠 返回首页</button>' +
        '</div></div></div>';
    } else {
      main.innerHTML = '<div class="results-screen"><div style="text-align:center;padding:40px 20px">' +
        '<div style="font-size:64px;margin-bottom:16px">📋</div>' +
        '<h2>本轮练习结束</h2>' +
        '<p style="color:var(--text-secondary);margin-top:8px">还有 <b style="color:var(--danger)">' + remaining + '</b> 道错题需要继续练习</p>' +
        '<div class="results-actions" style="margin-top:20px">' +
          '<button class="primary" onclick="startWrongBookPractice()">🔄 继续练习</button>' +
          '<button onclick="navigate(\'wrongBook\')">📕 返回错题本</button>' +
        '</div></div></div>';
    }
    updateWrongBookHint();
    return;
  }

  var item = p.questions[p.currentIndex];
  // Check if this question is still in the wrong book (might have been removed)
  if(!isInWrongBook({question: item.question, answer: item.answer, type: item.type})){
    // Already removed, skip to next
    p.currentIndex++;
    p.selectedOptions = null;
    p.answered = false;
    renderWrongBookPractice();
    return;
  }

  p.selectedOptions = (item.type === 'multi') ? [] : null;
  p.answered = false;

  var labels = ['A','B','C','D','E','F'];
  var optionsHTML = '';
  if(item.options && item.options.length > 0){
    for(var i = 0; i < item.options.length; i++){
      optionsHTML += '<div class="exam-option" id="wopt' + i + '" onclick="selWrongOpt(' + i + ')">' +
        '<span class="opt-letter">' + labels[i] + '</span>' +
        '<span>' + String(item.options[i]).replace(/^[A-F][.、]?\s*/, '') + '</span>' +
      '</div>';
    }
  }

  var totalQ = p.questions.length;
  var multiTag = item.type === 'multi' ? '<span class="multi-tag">多选</span> ' : '';

  progressInfo.textContent = '错题重练 · 第' + (p.currentIndex + 1) + '/' + totalQ + '题';

  main.innerHTML = '<div class="exam-screen">' +
    '<div class="exam-header">' +
      '<span class="subject-badge english">错题重练</span>' +
      '<span class="q-counter">第 ' + (p.currentIndex + 1) + ' / ' + totalQ + ' 题</span>' +
    '</div>' +
    '<div class="exam-question" id="wQuestionBox">' +
      '<div class="q-num">第 ' + (p.currentIndex + 1) + ' 题</div>' +
      '<div class="q-text">' + multiTag + item.question + '</div>' +
      optionsHTML +
    '</div>' +
    '<div class="submit-row">' +
      '<button onclick="submitWrongAns()" id="wSubmitBtn">✓ 确认答案</button>' +
    '</div>' +
    '<div id="wFeedback" style="margin-top:12px"></div>' +
  '</div>';
}

function selWrongOpt(index){
  var p = appState.practice;
  if(p.answered) return;
  var item = p.questions[p.currentIndex];

  if(item.type === 'multi'){
    var sel = p.selectedOptions;
    var pos = -1;
    for(var i = 0; i < sel.length; i++){
      if(sel[i] === index){ pos = i; break; }
    }
    var el = document.getElementById('wopt' + index);
    if(pos >= 0){
      sel.splice(pos, 1);
      if(el) el.classList.remove('multi-selected');
    } else {
      sel.push(index);
      if(el) el.classList.add('multi-selected');
    }
  } else {
    var all = document.querySelectorAll('#wQuestionBox .exam-option');
    for(var i = 0; i < all.length; i++){
      all[i].classList.remove('selected');
    }
    var el = document.getElementById('wopt' + index);
    if(el) el.classList.add('selected');
    p.selectedOptions = [index];
  }
}

function submitWrongAns(){
  var p = appState.practice;
  if(p.answered) return;

  var item = p.questions[p.currentIndex];
  var isCorrect = false;

  if(item.type === 'multi'){
    var userAns = (p.selectedOptions && p.selectedOptions.length > 0) ? p.selectedOptions.slice().sort() : [];
    var correctAns = item.answer.slice().sort();
    isCorrect = userAns.length === correctAns.length && userAns.every(function(v, i){ return v === correctAns[i]; });
  } else {
    var ua = (p.selectedOptions && p.selectedOptions.length > 0) ? p.selectedOptions[0] : -1;
    isCorrect = (ua === item.answer);
  }

  p.answered = true;

  // Update wrong book
  if(isCorrect){
    removeFromWrongBook(item.fingerprint);
  }

  // Disable options
  var all = document.querySelectorAll('#wQuestionBox .exam-option');
  for(var i = 0; i < all.length; i++){
    all[i].style.pointerEvents = 'none';
  }

  // Show correct answer
  var labels = ['A','B','C','D','E','F'];
  var correctDisplay;
  if(item.type === 'multi'){
    correctDisplay = item.answer.map(function(a){ return labels[a]; }).join('、');
  } else {
    correctDisplay = labels[item.answer] || String(item.answer);
  }

  // Highlight correct/wrong options
  if(item.type === 'multi'){
    for(var j = 0; j < item.answer.length; j++){
      var el = document.getElementById('wopt' + item.answer[j]);
      if(el) el.classList.add('correct-highlight');
    }
    if(p.selectedOptions){
      for(var k = 0; k < p.selectedOptions.length; k++){
        if(item.answer.indexOf(p.selectedOptions[k]) < 0){
          var el2 = document.getElementById('wopt' + p.selectedOptions[k]);
          if(el2) el2.classList.add('wrong-highlight');
        }
      }
    }
  } else {
    var correctEl = document.getElementById('wopt' + item.answer);
    if(correctEl) correctEl.classList.add('correct-highlight');
    if(p.selectedOptions && p.selectedOptions[0] >= 0 && p.selectedOptions[0] !== item.answer){
      var wrongEl = document.getElementById('wopt' + p.selectedOptions[0]);
      if(wrongEl) wrongEl.classList.add('wrong-highlight');
    }
  }

  // Show feedback
  var feedbackHTML = '';
  if(isCorrect){
    feedbackHTML = '<div style="background:var(--green-light);border:1px solid var(--green);border-radius:12px;padding:12px;margin-top:8px">' +
      '<div style="font-weight:700;color:var(--success);font-size:16px">✅ 回答正确！</div>' +
      '<div style="margin-top:4px;color:var(--text-secondary);font-size:13px">已从错题本中移除</div>';
  } else {
    feedbackHTML = '<div style="background:#fef2f2;border:1px solid var(--danger);border-radius:12px;padding:12px;margin-top:8px">' +
      '<div style="font-weight:700;color:var(--danger);font-size:16px">❌ 回答错误</div>' +
      '<div style="margin-top:4px">正确答案：<b>' + correctDisplay + '</b></div>';
  }
  if(item.explanation){
    feedbackHTML += '<div style="margin-top:6px;color:var(--text-secondary);font-size:13px">💡 ' + item.explanation + '</div>';
  }
  feedbackHTML += '</div>';

  document.getElementById('wFeedback').innerHTML = feedbackHTML;

  // Update button
  var submitBtn = document.getElementById('wSubmitBtn');
  if(submitBtn){
    submitBtn.textContent = p.currentIndex + 1 >= p.questions.length ? '完成' : '下一题 →';
    submitBtn.onclick = advanceWrongPractice;
  }
}

  p.answered = false;
  updateWrongBookHint();
  renderWrongBookPractice();
